name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: simple
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Builds + pushes the Docker Hub image only when release-please actually cuts a
  # release on this push (its release PR was merged). On the merge that opens the
  # release PR, release_created is false and this job is skipped — the image is
  # published on the follow-up merge that lands the release. The 0.3.0 release
  # predates this job and was never published; build it once by hand (or tag-push)
  # to backfill — see docker/dockerhub-readme.md.
  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # QEMU registers binfmt handlers so buildx can build the arm64 image on
      # the amd64 runner via emulation. Slower than native, but no arm runner
      # needed. Required for the multi-arch `platforms` below.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: middagtec/middag-demo-standalone
          # tag_name is "v0.3.0"; semver pattern strips the leading v -> 0.3.0,
          # plus the moving "latest" tag for the newest release.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
