name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Self-contained release-please workflow.
#
# NOTE (ADR-006 deviation): the org pattern is a thin wrapper over the reusable
# workflows in middag-io/.github-private. A PUBLIC repository cannot consume
# reusable workflows from a PRIVATE repository, so the wrapper fails to start
# here with "error parsing called workflow ... release-please.yml@main". Until
# the reusable workflows are published to a PUBLIC repo (e.g. middag-io/.github),
# this repo inlines release-please + sync-develop so releases are not blocked.
# Matches the same fix applied to middag-php-framework/moodle/wordpress.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  # Builds + pushes the Docker Hub image only when release-please actually cuts a
  # release on this push (its release PR was merged). On the merge that opens the
  # release PR, release_created is false and this job is skipped — the image is
  # published on the follow-up merge that lands the release. The 0.3.0 release
  # predates this job and was never published; build it once by hand (or tag-push)
  # to backfill — see docker/dockerhub-readme.md.
  docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read # the UI build stage pulls @middag-io/react from GitHub Packages
    steps:
      - uses: actions/checkout@v5

      # QEMU registers binfmt handlers so buildx can build the arm64 image on
      # the amd64 runner via emulation. Slower than native, but no arm runner
      # needed. Required for the multi-arch `platforms` below.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: middagtec/middag-demo-standalone
          # tag_name is "v0.3.0"; semver pattern strips the leading v -> 0.3.0,
          # plus the moving "latest" tag for the newest release.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GITHUB_TOKEN (packages:read) auths the UI stage's npm ci against
          # GitHub Packages for @middag-io/react. Same token the e2e workflow uses.
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Keep develop current with whatever release-please shipped onto main, so the
  # GitFlow loop stays closed and develop never drifts behind.
  sync-develop:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-edit
          git push origin develop
